<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagrama de Venn — Operações de Conjuntos</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: #0f0f13;
    color: #e8e3d8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #18181f;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 28px 24px 32px;
    max-width: 720px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #7a9cc4;
    margin-bottom: 20px;
    text-align: center;
  }

  .btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }

  .op-btn {
    cursor: pointer;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid #2e2e3e;
    background: #222230;
    color: #b0aec8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: background .15s, border-color .15s, color .15s;
  }
  .op-btn:hover { border-color: #4a6fa5; color: #c8d8f0; }
  .op-btn.active {
    background: #1a3356;
    border-color: #4a80c4;
    color: #9dc8f8;
    font-weight: 500;
  }

  #desc {
    font-size: 13.5px;
    font-family: 'Lora', serif;
    font-style: italic;
    color: #9090b0;
    min-height: 40px;
    text-align: center;
    margin-bottom: 8px;
    line-height: 1.6;
    padding: 0 12px;
  }

  #venn { display: block; width: 100%; }

  .circle-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 18px;
    fill: #6a7d9a;
  }
  .elem-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    fill: #7a8aaa;
  }
  .u-label {
    font-family: 'Lora', serif;
    font-size: 12px;
    fill: #4a4a6a;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Operações de Conjuntos</h1>

  <div class="btns">
    <button class="op-btn active" onclick="show('uniao',this)">A ∪ B — União</button>
    <button class="op-btn" onclick="show('inter',this)">A ∩ B — Interseção</button>
    <button class="op-btn" onclick="show('difab',this)">A − B — Diferença</button>
    <button class="op-btn" onclick="show('difba',this)">B − A — Diferença</button>
    <button class="op-btn" onclick="show('compa',this)">~A — Complemento</button>
    <button class="op-btn" onclick="show('disj',this)">Disjuntos</button>
  </div>

  <div id="desc">Tudo que está em A ou em B (ou em ambos).</div>

  <svg id="venn" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="clipA"><ellipse cx="280" cy="120" rx="130" ry="90"/></clipPath>
      <clipPath id="clipB"><ellipse cx="400" cy="120" rx="130" ry="90"/></clipPath>
    </defs>

    <!-- Universe -->
    <rect x="30" y="20" width="620" height="200" rx="10" fill="none" stroke="#2a2a3e" stroke-width="1.5"/>
    <text class="u-label" x="55" y="42">U</text>

    <!-- União: both circles highlighted -->
    <ellipse id="h-ua" cx="280" cy="120" rx="130" ry="90" fill="#378ADD" fill-opacity="0.35" class="hl"/>
    <ellipse id="h-ub" cx="400" cy="120" rx="130" ry="90" fill="#378ADD" fill-opacity="0.35" class="hl"/>

    <!-- Interseção: overlap only (clip to B) -->
    <ellipse id="h-ia" cx="280" cy="120" rx="130" ry="90" fill="#378ADD" fill-opacity="0" clip-path="url(#clipB)" class="hl"/>

    <!-- Diferença A-B: A filled, then overlap masked -->
    <ellipse id="h-da" cx="280" cy="120" rx="130" ry="90" fill="#378ADD" fill-opacity="0" class="hl"/>
    <ellipse id="h-da-mask" cx="400" cy="120" rx="130" ry="90" fill="#18181f" fill-opacity="0" class="hl"/>

    <!-- Diferença B-A -->
    <ellipse id="h-db" cx="400" cy="120" rx="130" ry="90" fill="#378ADD" fill-opacity="0" class="hl"/>
    <ellipse id="h-db-mask" cx="280" cy="120" rx="130" ry="90" fill="#18181f" fill-opacity="0" class="hl"/>

    <!-- Complemento A: universe minus A -->
    <rect id="h-ca-u" x="30" y="20" width="620" height="200" rx="10" fill="#378ADD" fill-opacity="0" class="hl"/>
    <ellipse id="h-ca-mask" cx="280" cy="120" rx="130" ry="90" fill="#18181f" fill-opacity="0" class="hl"/>

    <!-- Circle outlines -->
    <ellipse id="circ-a" cx="280" cy="120" rx="130" ry="90" fill="none" stroke="#2e5080" stroke-width="2"/>
    <ellipse id="circ-b" cx="400" cy="120" rx="130" ry="90" fill="none" stroke="#2e5080" stroke-width="2"/>

    <!-- Labels -->
    <text id="label-a" class="circle-label" x="215" y="115" text-anchor="middle">A</text>
    <text id="label-b" class="circle-label" x="466" y="115" text-anchor="middle">B</text>

    <!-- Elements -->
    <circle cx="220" cy="130" r="3" fill="#5a6a8a"/>
    <text class="elem-label" x="220" y="148" text-anchor="middle">0</text>
    <circle cx="250" cy="108" r="3" fill="#5a6a8a"/>
    <text class="elem-label" x="250" y="126" text-anchor="middle">1</text>
    <circle cx="340" cy="120" r="3" fill="#5a6a8a"/>
    <text class="elem-label" x="340" y="138" text-anchor="middle">2</text>
    <circle cx="430" cy="108" r="3" fill="#5a6a8a"/>
    <text class="elem-label" x="430" y="126" text-anchor="middle">3</text>
    <circle cx="590" cy="80" r="3" fill="#5a6a8a"/>
    <text class="elem-label" x="590" y="98" text-anchor="middle">5</text>
  </svg>
</div>

<script>
const BG = '#18181f';

const ops = {
  uniao: {
    desc: 'Tudo que está em A ou em B (ou em ambos).',
    show: ['h-ua','h-ub'], alpha: 0.35, disjoint: false
  },
  inter: {
    desc: 'Apenas o que está em A E em B ao mesmo tempo.',
    show: ['h-ia'], alpha: 0.55, disjoint: false
  },
  difab: {
    desc: 'O que está em A mas NÃO está em B (A remove a interseção).',
    show: ['h-da','h-da-mask'], alpha: [0.35, 1], disjoint: false
  },
  difba: {
    desc: 'O que está em B mas NÃO está em A (B remove a interseção).',
    show: ['h-db','h-db-mask'], alpha: [0.35, 1], disjoint: false
  },
  compa: {
    desc: 'Tudo no universo U que NÃO pertence a A.',
    show: ['h-ca-u','h-ca-mask'], alpha: [0.3, 1], disjoint: false
  },
  disj: {
    desc: 'A ∩ B = ∅ — os conjuntos não têm nenhum elemento em comum.',
    show: [], alpha: 0, disjoint: true
  }
};

function reset() {
  document.querySelectorAll('.hl').forEach(e => e.setAttribute('fill-opacity', '0'));
  // Mask elements back to transparent (not opaque)
  ['h-da-mask','h-db-mask','h-ca-mask'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.setAttribute('fill', BG); el.setAttribute('fill-opacity','0'); }
  });
  document.getElementById('circ-a').setAttribute('cx','280');
  document.getElementById('circ-b').setAttribute('cx','400');
  document.getElementById('label-a').setAttribute('x','215');
  document.getElementById('label-b').setAttribute('x','466');
}

function show(op, btn) {
  reset();
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cfg = ops[op];
  document.getElementById('desc').textContent = cfg.desc;

  if (cfg.disjoint) {
    document.getElementById('circ-a').setAttribute('cx','230');
    document.getElementById('circ-b').setAttribute('cx','450');
    document.getElementById('label-a').setAttribute('x','165');
    document.getElementById('label-b').setAttribute('x','516');
    return;
  }

  cfg.show.forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    const a = Array.isArray(cfg.alpha) ? cfg.alpha[i] : cfg.alpha;
    el.setAttribute('fill-opacity', a);
  });
}

show('uniao', document.querySelector('.op-btn.active'));
</script>
</body>
</html>
