<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1115;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 30px;
    color: #e6e6e6;
  }

  .wrap {
    width: 100%;
    max-width: 700px;
  }

  .card {
    background: #1a1d24;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #9aa4b2;
  }

  .grammar-box {
    font-family: monospace;
    line-height: 1.8;
    font-size: 13px;
  }

  .chain-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 50px;
    align-items: center;
  }

  .sym-t {
    background: #1f3d2b;
    color: #6ee7a2;
    border: 1px solid #2ecc71;
  }

  .sym-nt {
    background: #3b1f24;
    color: #ff7a7a;
    border: 1px solid #ff4d4d;
  }

  .sym-t, .sym-nt {
    padding: 6px 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 15px;
    transition: 0.2s;
  }

  .rules-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .rule-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: #2a2f3a;
    color: #e6e6e6;
    cursor: pointer;
    transition: 0.2s;
    font-size: 13px;
  }

  .rule-btn:hover {
    background: #3a4150;
    transform: translateY(-1px);
  }

  .rule-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .status {
    font-size: 13px;
    color: #9aa4b2;
  }

  .status.done {
    color: #6ee7a2;
    font-weight: 500;
  }

  .history {
    font-family: monospace;
    font-size: 12px;
    max-height: 140px;
    overflow-y: auto;
    line-height: 1.7;
  }

  .reset-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #ff4d4d;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
  }

  .reset-btn:hover {
    background: #ff2f2f;
  }
</style>

<div class="wrap">

  <div class="card grammar-box">
    <div class="title">Gramática</div>
    V = {S, A} &nbsp;&nbsp; Σ = {a, b}<br>
    S → aS<br>
    S → bA<br>
    A → bA<br>
    A → b
  </div>

  <div class="card">
    <div class="title">Cadeia atual</div>
    <div class="chain-display" id="chain-display"></div>
  </div>

  <div class="card status" id="status">
    Aplique uma regra ao primeiro não-terminal disponível.
  </div>

  <div class="card">
    <div class="title">Regras</div>
    <div class="rules-wrap">
      <button class="rule-btn" id="r1" onclick="apply(1)">S → aS</button>
      <button class="rule-btn" id="r2" onclick="apply(2)">S → bA</button>
      <button class="rule-btn" id="r3" onclick="apply(3)" disabled>A → bA</button>
      <button class="rule-btn" id="r4" onclick="apply(4)" disabled>A → b</button>
    </div>
  </div>

  <div class="card history" id="history">
    S ← início
  </div>

  <button class="reset-btn" onclick="reset()">↺ Recomeçar</button>

</div>

<script>
let chain = [{sym:'S', isNT:true}];
let done = false;

function firstNT() {
  return chain.findIndex(x => x.isNT);
}

function render() {
  const display = document.getElementById('chain-display');
  display.innerHTML = chain.map(x =>
    `<span class="${x.isNT ? 'sym-nt' : 'sym-t'}">${x.sym}</span>`
  ).join('');

  const idx = firstNT();
  const curNT = idx >= 0 ? chain[idx].sym : null;

  document.getElementById('r1').disabled = curNT !== 'S' || done;
  document.getElementById('r2').disabled = curNT !== 'S' || done;
  document.getElementById('r3').disabled = curNT !== 'A' || done;
  document.getElementById('r4').disabled = curNT !== 'A' || done;

  const status = document.getElementById('status');

  if (!curNT) {
    done = true;
    const word = chain.map(x => x.sym).join('');
    status.textContent = `✅ Cadeia final: "${word}"`;
    status.className = 'card status done';
  } else {
    status.textContent = `Próximo: ${curNT}`;
    status.className = 'card status';
  }
}

function apply(rule) {
  if (done) return;

  const idx = firstNT();
  if (idx < 0) return;

  const cur = chain[idx].sym;
  let replacement = [];

  if (rule === 1 && cur === 'S') replacement = [{sym:'a',isNT:false},{sym:'S',isNT:true}];
  else if (rule === 2 && cur === 'S') replacement = [{sym:'b',isNT:false},{sym:'A',isNT:true}];
  else if (rule === 3 && cur === 'A') replacement = [{sym:'b',isNT:false},{sym:'A',isNT:true}];
  else if (rule === 4 && cur === 'A') replacement = [{sym:'b',isNT:false}];
  else return;

  chain.splice(idx, 1, ...replacement);

  const word = chain.map(x => x.sym).join('');
  const hist = document.getElementById('history');
  hist.innerHTML += `<br>${word} ← regra ${rule}`;
  hist.scrollTop = hist.scrollHeight;

  render();
}

function reset() {
  chain = [{sym:'S', isNT:true}];
  done = false;
  document.getElementById('history').innerHTML = 'S ← início';
  render();
}

render();
</script>
